<div class="container py-5">
  <h1 class="text-center mb-5">Dress Code</h1>

  <div class="row">
    <div class="col-lg-8 offset-lg-2">
      <div class="card mb-4 shadow-sm">
        <div class="card-header bg-info text-white">
          <h4 class="mb-0"><i class="fas fa-female me-2"></i> Girls</h4>
        </div>
        <div class="card-body">
          <ul class="list-group list-group-flush">
            @for (item of girlsDressCode; track item) {
              <li class="list-group-item">
                <i class="fas fa-check text-success me-2"></i>{{ item }}
              </li>
            }
          </ul>
        </div>
      </div>

      <div class="card mb-4 shadow-sm">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0"><i class="fas fa-male me-2"></i> Boys</h4>
        </div>
        <div class="card-body">
          <ul class="list-group list-group-flush">
            @for (item of boysDressCode; track item) {
              <li class="list-group-item">
                <i class="fas fa-check text-success me-2"></i>{{ item }}
              </li>
            }
          </ul>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-header bg-warning">
          <h4 class="mb-0"><i class="fas fa-redo me-2"></i> Hair Guidelines</h4>
        </div>
        <div class="card-body">
          <ul class="list-group list-group-flush">
            @for (item of hairGuidelines; track item) {
              <li class="list-group-item">
                <i class="fas fa-star text-warning me-2"></i>{{ item }}
              </li>
            }
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>
